databases:
  - name: corteya-db
    plan: free
    databaseName: corteya
    user: corteya

services:
  - type: web
    name: corteya-app
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: corteya-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
