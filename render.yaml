databases:
  - name: turnify-db
    plan: basic-256mb
    databaseName: turnify
    user: turnify

services:
  - type: web
    name: turnify-app
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: turnify-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false

  - type: cron
    name: turnify-reminders
    runtime: node
    plan: free
    schedule: "*/15 * * * *"
    buildCommand: npm install --include=dev && npx prisma generate
    startCommand: npm run send-reminders
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: turnify-db
          property: connectionString
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
