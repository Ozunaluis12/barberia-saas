databases:
  - name: turnify-db
    plan: basic-256mb
    databaseName: turnify
    user: turnify

services:
  - type: web
    name: turnify-app
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma db push --accept-data-loss && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: turnify-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
